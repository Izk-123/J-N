##############################################################
# Nginx configuration for J&N Building Products
# Domain: jandn.mw  |  Server: 204.168.251.91
# File location on server: /etc/nginx/sites-available/jandn.mw
##############################################################

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name jandn.mw www.jandn.mw;

    # Let's Encrypt challenge (needed for SSL cert)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name jandn.mw www.jandn.mw;

    # SSL certificates (created by Certbot)
    ssl_certificate     /etc/letsencrypt/live/jandn.mw/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jandn.mw/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Logs
    access_log /var/log/nginx/jandn.mw.access.log;
    error_log  /var/log/nginx/jandn.mw.error.log;

    # Max upload size (for admin image uploads)
    client_max_body_size 20M;

    # Static files — served directly by Nginx (fast!)
    location /static/ {
        alias /var/www/jandn/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files — uploaded images
    location /media/ {
        alias /var/www/jandn/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Everything else → Gunicorn (Django)
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
    }
}
