{% load static %}
<div class="page-header d-flex align-items-center justify-content-center text-center"
     style="min-height: 40vh; background: linear-gradient(rgba(10,17,40,0.85), rgba(0,0,0,0.75)), url('{% if page_header_image %}{{ page_header_image.url }}{% else %}{% static 'img/page-header-bg.jpg' %}{% endif %}') center/cover fixed; background-attachment: fixed;">
    <div class="container" data-aos="fade-up" data-aos-duration="1000">
        <h1 class="display-3 fw-bold text-white mb-3">{{ title }}</h1>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb justify-content-center bg-transparent p-0">
                <li class="breadcrumb-item"><a href="{% url 'construction:home' %}" class="text-white-50">Home</a></li>
                <li class="breadcrumb-item text-white active" aria-current="page">{{ active_page }}</li>
            </ol>
        </nav>
    </div>
</div>
